<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Özel Güvenli Mesajlaşma</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body>

    <div id="login-screen" class="auth-container">
        <div class="auth-card">
            <h2>Güvenli Giriş</h2>
            <p style="font-size: 11px; color: #8696a0; margin-bottom: 15px;">En iyi mobil deneyim için giriş yaptıktan sonra tam ekrana geçilecektir.</p>
            <input type="text" id="password-input" placeholder="Erişim Şifresi" autocomplete="off" name="x_dummy_field_no_save" />
            <button id="login-btn">Giriş Yap</button>
        </div>
    </div>

    <div id="app-container" class="app-layout hidden">
        
        <aside class="side-panel">
            <header class="side-header">
                <div class="user-avatar" id="my-avatar">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#aebac1"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                </div>
                <div class="side-actions">
                    <span class="action-icon">💬</span>
                    <span class="action-icon" id="fullscreen-toggle-btn" title="Tam Ekran Modu">⛶</span>
                </div>
            </header>
            
            <div class="search-bar-container">
                <div class="search-bar">
                    <input type="text" placeholder="Aratın veya yeni sohbet başlayın" disabled>
                </div>
            </div>
            
            <div class="chats-list">
                <div class="chat-item active">
                    <div class="chat-avatar custom-pp">
                        <svg viewBox="0 0 100 100" width="100%" height="100%">
                            <circle cx="50" cy="50" r="50" fill="#004d40"/>
                            <text x="50" y="42" font-size="28" fill="#53bdeb" font-weight="bold" text-anchor="middle" font-family="monospace">f(x)</text>
                            <text x="50" y="78" font-size="34" fill="#00a884" font-weight="bold" text-anchor="middle" font-family="monospace">∑</text>
                        </svg>
                    </div>
                    <div class="chat-info">
                        <div class="chat-main-row">
                            <h3 id="target-name-side">Sohbet Edilen Kişi</h3>
                        </div>
                        <p class="chat-sub-text" id="side-status">çevrimdışı</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <div class="chat-header-info">
                    <button type="button" id="back-to-list-btn" class="back-btn">←</button>
                    
                    <div class="chat-avatar custom-pp" style="width: 40px; height: 40px; margin-right: 12px;">
                        <svg viewBox="0 0 100 100" width="100%" height="100%">
                            <circle cx="50" cy="50" r="50" fill="#004d40"/>
                            <text x="50" y="42" font-size="28" fill="#53bdeb" font-weight="bold" text-anchor="middle" font-family="monospace">f(x)</text>
                            <text x="50" y="78" font-size="34" fill="#00a884" font-weight="bold" text-anchor="middle" font-family="monospace">∑</text>
                        </svg>
                    </div>
                    <div class="chat-user-details">
                        <h3 id="target-name-top">Yükleniyor...</h3>
                        <span id="target-status" class="status-text">bağlanıyor...</span>
                    </div>
                </div>
            </header>

            <div id="chat-messages" class="message-area"></div>

            <div id="sticker-panel" class="hidden"></div>

            <footer class="chat-footer">
                <div class="footer-actions">
                    <button type="button" id="sticker-btn" title="Çıkartma Gönder">🙂</button>
                    <button type="button" id="attach-dummy-btn">📎</button>
                </div>
                
                <textarea id="message-input" placeholder="Bir mesaj yazın" rows="1" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false" data-form-type="other" data-lpignore="true" name="not_a_card_field" style="resize: none;"></textarea>
                                          
                <button type="button" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
                    </svg>
                </button>
            </footer>
        </main>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
