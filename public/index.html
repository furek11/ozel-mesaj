<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Sohbet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container" class="card">
        <h2>Güvenli Giriş</h2>
        <p>Erişim sağlamak için şifrenizi girin.</p>
        <input type="password" id="password-input" placeholder="Şifreniz">
        <button id="login-btn">Giriş Yap</button>
        <p id="error-msg" class="error"></p>
    </div>

    <div id="chat-container" class="hidden">
        <div id="chat-header">
            <div class="user-info">
                <span id="chat-partner-name">Sohbet Odası</span>
                <span id="chat-partner-status">Yükleniyor...</span>
            </div>
        </div>
        <div id="messages-box"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Mesajınızı yazın...">
            <button id="send-btn">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
